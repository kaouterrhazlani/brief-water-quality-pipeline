# =========================================================
# ENVIRONMENT
# =========================================================
environment:
  is_databricks: false
  active_mode:   dev

  mode:
    dev:
      years:       [2024, 2025, 2026]
      departments: ["13", "69", "75"]
      max_workers: 5

    prod:
      years:       [2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025, 2026]
      departments: "DEFAULT_FRANCE"
      max_workers: 20


# =========================================================
# STORAGE
# =========================================================
storage:
  bronze:
    local:      "data"
    databricks: "dbfs:/mnt/bronze"


# =========================================================
# PIPELINES
# =========================================================
pipelines:

  hubeau:
    api_url:       "https://hubeau.eaufrance.fr/api/v1/qualite_eau_potable/resultats_dis"
    pipeline_name: "hubeau_bronze"
    dataset_name:  "bronze"
    file_format:   "delta"
    max_depth:     20000
    max_retries:   3
    pagination:
      sleep_between_requests: 0.3
    date_format:
      force_end_of_day:  true
      end_of_day_suffix: "T23:59:59Z"
    primary_key:
      - "code_commune"
      - "libelle_parametre"
      - "date_prelevement"
    transformation:
      partition_column: "annee_partition"
      serialize_lists:
        reseaux: "json"
    logging:
      level:           "INFO"
      include_context: true
      format:          "human"
    metrics:
      enable:            false
      log_records_count: true
      log_failed_tasks:  true

  geo:
    base_url:       "https://geo.api.gouv.fr"
    pipeline_name:  "geo_bronze"
    dataset_name:   "bronze"
    file_format:    "delta"
    commune_fields: "code,nom,codeDepartement,codeRegion,centre,population"
    tables:
      regions:
        primary_key: "code_region"
      departements:
        primary_key: "code_departement"
      communes:
        primary_key: "code_commune"
    max_workers: 5
    limits:
      communes_limit: 100000
    logging:
      level:           "INFO"
      include_context: false

# =========================================================
# SILVER
# =========================================================
silver:
  output_table: "water_quality"

  spark:
    app_name:           "silver_transform"
    driver_memory:      "4g"
    shuffle_partitions: 8

  paths:
    local:
      bronze: "data/bronze"
      silver: "data/silver"
    databricks:
      bronze: "dbfs:/mnt/bronze"
      silver: "dbfs:/mnt/silver"

  dedup_keys:
    - "code_prelevement"
    - "code_parametre"
    - "code_lieu_analyse"

  partition_by:
    - "annee"
    - "code_departement"

  # Mapping code_type_parametre â libellÃĐ catÃĐgorie (doc SISE-Eaux)
  categories:
    B: "Microbiologique"
    P: "Physico-chimique"
    R: "Radiologique"
    N: "Physicochimique"
    O: "Organoleptique"

  # Sous-catÃĐgories par regex sur libelle_parametre
  sous_categories:
    "Azote":           "nitrate|nitrite|azote"
    "Pesticide":       "pesticide|herbicide|insecticide|atrazine"
    "Metal lourd":     "plomb|arsenic|chrome|cadmium|mercure|cuivre"
    "Organoleptique":  "ph|turbiditÃĐ|turbidite|conductivitÃĐ|conductivite|couleur|odeur"
    "Bacteriologique": "escherichia|coliform|entÃĐrocoque|enterocoque|bactÃĐrie|bacterie|coli|fÃĐcaux"
    "Desinfection":    "chlore|chlorure|dÃĐsinfect|desinfect"
    "Radiologique":    "radioactivitÃĐ|radioactivite|tritium|cÃĐsium|cesium"

  # Colonnes finales du DataFrame Silver (ordre conservÃĐ)
  output_columns:
    - code_prelevement
    - reference_analyse
    - date_prelevement
    - annee
    - mois
    - code_commune
    - nom_commune
    - code_departement
    - nom_departement
    - nom_region
    - code_region
    - latitude
    - longitude
    - population
    - code_reseau
    - nom_reseau
    - nom_distributeur
    - nom_uge
    - code_parametre
    - libelle_parametre
    - libelle_parametre_maj
    - code_type_parametre
    - categorie_parametre
    - sous_categorie_parametre
    - resultat_numerique
    - resultat_alphanumerique
    - libelle_unite
    - code_lieu_analyse
    - conformite_globale
    - conformite_standard
    - est_conforme
    - conformite_bact
    - conformite_pc
    - conformite_ref_bact
